name: bikepool
description: P2P Real-time Bike & Car Pooling App for Hyderabad
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Maps & Location (flutter_map works on web/Windows/Android/iOS - no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.2
  flutter_staggered_animations: ^1.1.1
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  cloud_functions: any

  # Google Maps Platform
  flutter_dotenv: ^5.1.0
  dart_geohash: ^2.0.4
  flutter_polyline_points: ^2.1.0
  uuid: ^4.4.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
